{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeacle.prometheus.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kubeacle.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'rightsizer'
        static_configs:
          - targets: ['{{ include "kubeacle.backend.fullname" . }}:{{ .Values.backend.service.port }}']
        metrics_path: /metrics
        scrape_interval: {{ .Values.prometheus.scrapeInterval }}

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape kube-state-metrics for workload metadata (replicas, requests,
      # limits, pod ownership, PVC info).  Uses Kubernetes endpoint discovery
      # so the target is found automatically regardless of namespace.
      - job_name: 'kube-state-metrics'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            regex: kube-state-metrics
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: http-metrics
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service

      # Scrape kubelet cAdvisor for live container resource usage
      # (container_cpu_usage_seconds_total, container_memory_working_set_bytes).
      # Connects via the Kubernetes API server proxy.  insecure_skip_verify is
      # set because the API-server proxy re-encrypts the connection and the
      # presented certificate may not match "kubernetes.default.svc" on every
      # distribution.  Traffic stays inside the cluster network.
      - job_name: 'kubelet-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node

      # Scrape kubelet for volume stats
      # (kubelet_volume_stats_used_bytes, kubelet_volume_stats_capacity_bytes).
      # Same API-server proxy approach as kubelet-cadvisor above.
      - job_name: 'kubelet'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
{{- end }}
