{{- if .Values.victoriametrics.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeacle.victoriametrics.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kubeacle.victoriametrics.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.victoriametrics.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubeacle.victoriametrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeacle.victoriametrics.selectorLabels" . | nindent 8 }}
      {{- with .Values.victoriametrics.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubeacle.serviceAccountName" . }}
      {{- with .Values.victoriametrics.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: victoriametrics
          image: {{ include "kubeacle.victoriametrics.image" . }}
          imagePullPolicy: {{ .Values.victoriametrics.image.pullPolicy }}
          {{- with .Values.victoriametrics.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - "-promscrape.config=/etc/victoriametrics/prometheus.yml"
            - "-storageDataPath=/victoria-metrics-data"
            - "-retentionPeriod={{ .Values.victoriametrics.retentionPeriod }}"
            - "-httpListenAddr=:{{ .Values.victoriametrics.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.victoriametrics.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.victoriametrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/victoriametrics
              readOnly: true
            - name: storage
              mountPath: /victoria-metrics-data
      volumes:
        - name: config
          configMap:
            name: {{ include "kubeacle.victoriametrics.fullname" . }}
        - name: storage
          {{- if .Values.victoriametrics.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kubeacle.victoriametrics.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.victoriametrics.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriametrics.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriametrics.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
